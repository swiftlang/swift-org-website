name: test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request: {types: [opened, reopened, synchronize, ready_for_review]}
  push: {branches: [main]}

jobs:
  soundness:
    name: Soundness
    uses: swiftlang/github-workflows/.github/workflows/soundness.yml@0.0.8
    with:
      license_header_check_project_name: "Swift.org"
      api_breakage_check_enabled: false

  build-site:
    name: Build the Jekyll Site
    runs-on: ubuntu-latest
    container: ruby:3.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build site
        run: bundle install && bundle exec jekyll build

  test-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Run OpenAPI Tester
        working-directory: openapi/TestSwiftOrgClient
        env:
          DOWNLOADSWIFTORG_SERVER_NAME: local
          SWIFTORG_SERVER_NAME: local
        run: |
            docker compose -f ../../docker-compose.yaml run build
            docker compose -f ../../docker-compose.yaml run -d -p 4000:4000 website
            swift run swiftorgClient
